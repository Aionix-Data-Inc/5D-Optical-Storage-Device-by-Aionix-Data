ruleset_name: writer-high-reliability-v1
description: Prioritize data integrity over speed
version: "1.0.0"
rules:
  - id: ECC_PROFILE
    action: set
    value: LDPC_3_5 + RS_255_223
  - id: WRITE_VERIFY
    action: enable
    value: full_pass
  - id: THERMAL_SCHEDULER
    action: mode
    value: conservative
applies_to:
  media: "Aionix-Glass-Gen2"
  layers: "all"
  env: "prod"

